<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  

<script>

  const el = document.createElement("div")

  let d = []

  function func(e){
    if(d.includes(Number(e.target.id))){
      return null
    }
    console.log(e.target.id)
    d.push(Number(e.target.id))

    document.getElementById(Number(e.target.id)).style.backgroundColor = "white"

    if(d.length === 8){
      for(let i = 0; i<10; i++){
        if(i === 9){
          d = []
        }
        setTimeout(() => {
        console.log("hello")
        const ell = document.getElementById(d[i])
        ell.style.backgroundColor = "red"
      }, 1000)
      }
    }
  
  }

  el.style.width = "fit-content"
  el.style.height = "fit-content"
  el.style.border = "5px solid black"
  el.style.gridTemplateColumns = "repeat(3, 1fr)"
  el.style.gridTemplateRows = "repeat(3, 1fr)"
  el.style.display = "grid"

  document.body.appendChild(el)


  for(let i = 1; i < 10; i++){

    const el1 = document.createElement("div")

    if(i === 5){
      el1.style.width = "100px"
      el1.style.height = "100px"
      el.appendChild(el1)
    }
    else{
      el1.style.width = "100px"
      el1.style.height = "100px"
      el1.id = i
      el1.style.backgroundColor = "red"
      el1.style.border = "5px solid black"
      el1.addEventListener("click", func)
      el.appendChild(el1)
    }

  }



</script>

</body>
</html>
